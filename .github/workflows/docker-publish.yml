name: Publish Container Images

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GHCR_IMAGE: ghcr.io/darkatse/tt-sync
  DOCKERHUB_IMAGE: darkatse/tt-sync

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect Docker Hub mirror configuration
        id: dockerhub
        shell: bash
        run: |
          if [[ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub token not configured; publishing GHCR only."
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=TT-Sync
            org.opencontainers.image.description=Remote synchronization server for TauriTavern
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: darkatse
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mirror GHCR tags to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        env:
          TAG_NAMES: ${{ steps.meta.outputs['tag-names'] }}
        shell: bash
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker buildx imagetools create \
              --tag "${DOCKERHUB_IMAGE}:${tag}" \
              "${GHCR_IMAGE}:${tag}"
          done <<< "$TAG_NAMES"
